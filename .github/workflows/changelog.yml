name: Update Changelog

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [main]
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-changelog:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       !startsWith(github.event.pull_request.head.ref, 'chore/update-changelog-'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate CHANGELOG.md
        run: git-cliff --output CHANGELOG.md

      - name: Create PR and auto-merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changelog changes" && exit 0

          BRANCH="chore/update-changelog-$(date +%s)"
          git checkout -b "$BRANCH"
          git commit -m "docs: update changelog"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "docs: update changelog" \
            --body "Auto-generated changelog update by git-cliff." \
            --base main \
            --head "$BRANCH")

          gh pr merge "$PR_URL" --admin --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
